name: Sync Ed Announcements

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Fetch Ed announcements
        env:
          ED_API_TOKEN: ${{ secrets.ED_API_TOKEN }}
          ED_COURSE_ID: '95724'
        run: python _scripts/fetch_ed_announcements.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _announcements/
          git diff --cached --quiet || (git commit -m "sync Ed announcements" && git push)
